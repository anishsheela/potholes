# Dashcam OCR Configuration
# Maps a friend's explicit folder name to their specific camera model's OCR extraction logic

cameras:
  anish:
    date_roi:
      coords: [1849, 1937, 15, 773]
      regex: '(?P<date>\d{4}[-/]\d{2}[-/]\d{2}[\s_]*\d{2}:\d{2}:\d{2})'
      
    gps_roi:
      coords: [1840, 1938, 1520, 2450]
      regex: '(?P<speed>\d{1,3})\s*(?:km/h|kmh).*?(?P<lon>[EW]\s*\d{1,3}\.\d{4}).*?(?P<lat>[NS]\s*\d{1,3}\.\d{4})'

  aravind:
    date_roi:
      coords: [1849, 1937, 15, 773]
      regex: '(?P<date>\d{4}[-/]\d{2}[-/]\d{2}[\s_]*\d{2}:\d{2}:\d{2})'
      
    gps_roi:
      coords: [1840, 1938, 1520, 2450]
      regex: '(?P<speed>\d{1,3})\s*(?:km/h|kmh).*?(?P<lon>[EW]\s*\d{1,3}\.\d{4}).*?(?P<lat>[NS]\s*\d{1,3}\.\d{4})'